<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo API Interactive Page</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f6f8fb;
        margin: 0;
        padding: 24px;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
        color: #1f2937;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 220px;
      }
      input,
      select,
      button {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        font-size: 14px;
      }
      button {
        cursor: pointer;
        border: none;
        background: #2563eb;
        color: #fff;
      }
      button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }
      .secondary {
        background: #0f766e;
      }
      .panel {
        margin-top: 14px;
        padding: 12px;
        border-radius: 8px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
      }
      .result {
        margin-top: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
      }
      th,
      td {
        border: 1px solid #dbe3ee;
        padding: 8px 10px;
        text-align: left;
        font-size: 13px;
      }
      th {
        background: #f1f5f9;
        color: #1f2937;
      }
      .empty {
        color: #64748b;
        font-size: 13px;
      }
      .status {
        font-size: 13px;
        color: #334155;
        margin-top: 8px;
      }
      .error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Demo API Interactive Page</h1>
      <p>
        Flow: generate mock data and review features first, then run risk
        assessment.
      </p>

      <div class="row">
        <div class="field">
          <label for="userId">User ID</label>
          <input id="userId" type="number" min="1" value="1001" />
        </div>
        <div class="field">
          <label for="opType">Mock Type</label>
          <select id="opType">
            <option value="normal">normal</option>
            <option value="block">block</option>
            <option value="manual_review">manual_review</option>
            <option value="watchlist">watchlist</option>
            <option value="clear">clear</option>
          </select>
        </div>
      </div>

      <div class="row">
        <button id="mockBtn">1) Generate Mock Data and Extract Features</button>
        <button id="riskBtn" class="secondary" disabled>
          2) Run Risk Assessment After Confirming Features
        </button>
      </div>

      <div class="status" id="status"></div>

      <div class="panel">
        <strong>Feature Result</strong>
        <div id="featureResult" class="result empty">No data yet.</div>
      </div>

      <div class="panel">
        <strong>Risk Assessment Result</strong>
        <div id="riskResult" class="result empty">No data yet.</div>
      </div>
    </div>

    <script>
      const mockBtn = document.getElementById("mockBtn");
      const riskBtn = document.getElementById("riskBtn");
      const statusEl = document.getElementById("status");
      const featureResult = document.getElementById("featureResult");
      const riskResult = document.getElementById("riskResult");

      let confirmedUserId = null;

      function setStatus(text, isError = false) {
        statusEl.textContent = text;
        statusEl.className = isError ? "status error" : "status";
      }

      function formatValue(value) {
        if (value === null || value === undefined) {
          return "-";
        }
        if (typeof value === "object") {
          return JSON.stringify(value);
        }
        return String(value);
      }

      function toRows(data) {
        if (Array.isArray(data)) {
          return data.map((item, index) => ({
            index: index + 1,
            value: item,
          }));
        }
        if (data && typeof data === "object") {
          return Object.entries(data).map(([key, value]) => ({ key, value }));
        }
        return [{ value: data }];
      }

      function renderTable(target, data) {
        target.innerHTML = "";
        target.className = "result";

        const rows = toRows(data);
        if (rows.length === 0) {
          target.textContent = "No data returned.";
          target.className = "result empty";
          return;
        }

        const table = document.createElement("table");
        const thead = document.createElement("thead");
        const tbody = document.createElement("tbody");
        const headerRow = document.createElement("tr");
        const columns = Object.keys(rows[0]);

        columns.forEach((column) => {
          const th = document.createElement("th");
          th.textContent = column;
          headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);

        rows.forEach((row) => {
          const tr = document.createElement("tr");
          columns.forEach((column) => {
            const td = document.createElement("td");
            td.textContent = formatValue(row[column]);
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });

        table.appendChild(thead);
        table.appendChild(tbody);
        target.appendChild(table);
      }

      function resetResult(target) {
        target.textContent = "No data yet.";
        target.className = "result empty";
      }

      async function requestJson(url, options = {}) {
        const res = await fetch(url, options);
        const data = await res.json();
        if (!res.ok) {
          const message = data?.detail || data?.message || "Request failed. Please try again.";
          throw new Error(message);
        }
        return data;
      }

      mockBtn.addEventListener("click", async () => {
        const userId = document.getElementById("userId").value;
        const opType = document.getElementById("opType").value;

        if (!userId) {
          setStatus("Please enter user_id first.", true);
          return;
        }

        setStatus("Generating mock data and extracting features...");
        riskBtn.disabled = true;
        resetResult(riskResult);

        try {
          const query = new URLSearchParams({
            user_id: userId,
            op_type: opType,
          });
          const data = await requestJson(
            `/ai-secure-agent/v1/demo/mock-data?${query.toString()}`,
            { method: "POST" },
          );
          renderTable(featureResult, data);
          confirmedUserId = userId;
          riskBtn.disabled = false;
          setStatus("Features generated. Review them before running risk assessment.");
        } catch (error) {
          featureResult.textContent = "Request failed.";
          featureResult.className = "result empty";
          setStatus(`Generation failed: ${error.message}`, true);
        }
      });

      riskBtn.addEventListener("click", async () => {
        if (!confirmedUserId) {
          setStatus("Please generate and confirm features first.", true);
          return;
        }

        setStatus("Running risk assessment...");

        try {
          const query = new URLSearchParams({ user_id: confirmedUserId });
          const data = await requestJson(
            `/ai-secure-agent/v1/demo/risk-access?${query.toString()}`,
            { method: "POST" },
          );
          renderTable(riskResult, data);
          setStatus("Risk assessment completed.");
        } catch (error) {
          riskResult.textContent = "Request failed.";
          riskResult.className = "result empty";
          setStatus(`Assessment failed: ${error.message}`, true);
        }
      });
    </script>
  </body>
</html>
