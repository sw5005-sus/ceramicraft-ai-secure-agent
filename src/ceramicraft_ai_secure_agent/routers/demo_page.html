<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo API Interactive Page</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f6f8fb;
        margin: 0;
        padding: 24px;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
        color: #1f2937;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 220px;
      }
      input,
      select,
      button {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        font-size: 14px;
      }
      button {
        cursor: pointer;
        border: none;
        background: #2563eb;
        color: #fff;
      }
      button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }
      .secondary {
        background: #0f766e;
      }
      .panel {
        margin-top: 14px;
        padding: 12px;
        border-radius: 8px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
      }
      .result {
        margin-top: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        table-layout: fixed;
      }
      th,
      td {
        border: 1px solid #dbe3ee;
        padding: 8px 10px;
        text-align: left;
        font-size: 13px;
        overflow-wrap: break-word;
        white-space: normal;
        word-break: keep-all;
      }
      th {
        background: #f1f5f9;
        color: #1f2937;
      }
      .empty {
        color: #64748b;
        font-size: 13px;
      }
      .status {
        font-size: 13px;
        color: #334155;
        margin-top: 8px;
      }
      .error {
        color: #b91c1c;
      }
      .risk-section {
        margin-bottom: 14px;
      }
      .risk-section-title {
        font-size: 13px;
        font-weight: bold;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 6px;
      }
      .risk-badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 12px;
        font-size: 13px;
        font-weight: bold;
        color: #fff;
      }
      .risk-badge-low { background: #16a34a; }
      .risk-badge-medium { background: #d97706; }
      .risk-badge-high { background: #dc2626; }
      .risk-badge-unknown { background: #64748b; }
      .action-badge {
        display: inline-block;
        padding: 3px 12px;
        border-radius: 12px;
        font-size: 13px;
        font-weight: bold;
        color: #fff;
      }
      .action-badge-allow { background: #16a34a; }
      .action-badge-watchlist { background: #2563eb; }
      .action-badge-manual_review { background: #d97706; }
      .action-badge-block { background: #dc2626; }
      .action-badge-unknown { background: #64748b; }
      .score-row {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        margin-top: 4px;
      }
      .score-item {
        font-size: 13px;
        color: #334155;
      }
      .score-item span {
        font-weight: bold;
        color: #1f2937;
      }
      .chip-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 4px;
      }
      .chip {
        display: inline-block;
        padding: 2px 10px;
        background: #e2e8f0;
        border-radius: 12px;
        font-size: 12px;
        color: #334155;
      }
      .bullet-list {
        margin: 4px 0 0 0;
        padding-left: 18px;
        font-size: 13px;
        color: #334155;
        line-height: 1.7;
      }
      .contrib-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        margin-top: 4px;
      }
      .contrib-table th,
      .contrib-table td {
        border: 1px solid #dbe3ee;
        padding: 6px 10px;
        text-align: left;
      }
      .contrib-table th {
        background: #f1f5f9;
        color: #1f2937;
      }
      .impact-positive { color: #dc2626; font-weight: bold; }
      .impact-negative { color: #16a34a; font-weight: bold; }
      .collapsible-toggle {
        cursor: pointer;
        font-size: 12px;
        color: #2563eb;
        background: none;
        border: none;
        padding: 0;
        margin-top: 4px;
        text-decoration: underline;
      }
      .raw-json-box {
        margin-top: 6px;
        background: #1e293b;
        color: #e2e8f0;
        padding: 10px;
        border-radius: 6px;
        font-size: 12px;
        font-family: monospace;
        white-space: pre-wrap;
        word-break: break-all;
        display: none;
      }
      .na-text {
        color: #94a3b8;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Demo API Interactive Page</h1>
      <p>
        Flow: generate mock data and review features first, then run risk
        assessment.
      </p>

      <div class="row">
        <div class="field">
          <label for="userId">User ID</label>
          <input id="userId" type="number" min="1" value="1001" />
        </div>
        <div class="field">
          <label for="opType">Mock Type</label>
          <select id="opType">
            <option value="normal">normal</option>
            <option value="block">block</option>
            <option value="manual_review">manual_review</option>
            <option value="watchlist">watchlist</option>
            <option value="clear">clear</option>
            <option value="query">query</option>
          </select>
        </div>
      </div>

      <div class="row">
        <button id="mockBtn">1) Generate Mock Data and Extract Features</button>
        <button id="riskBtn" class="secondary" disabled>
          2) Run Risk Assessment After Confirming Features
        </button>
      </div>

      <div class="status" id="status"></div>

      <div class="panel">
        <strong>Feature Result</strong>
        <div id="featureResult" class="result empty">No data yet.</div>
      </div>

      <div class="panel">
        <strong>Risk Assessment Result</strong>
        <div id="riskResult" class="result empty">No data yet.</div>
      </div>
    </div>

    <script>
      const mockBtn = document.getElementById("mockBtn");
      const riskBtn = document.getElementById("riskBtn");
      const statusEl = document.getElementById("status");
      const featureResult = document.getElementById("featureResult");
      const riskResult = document.getElementById("riskResult");

      let confirmedUserId = null;

      function setStatus(text, isError = false) {
        statusEl.textContent = text;
        statusEl.className = isError ? "status error" : "status";
      }

      function formatValue(value) {
        if (value === null || value === undefined) {
          return "-";
        }
        if (typeof value === "object") {
          return JSON.stringify(value);
        }
        return String(value);
      }

      function toRows(data) {
        if (Array.isArray(data)) {
          return data.map((item, index) => ({
            index: index + 1,
            value: item,
          }));
        }
        if (data && typeof data === "object") {
          return Object.entries(data).map(([key, value]) => ({ key, value }));
        }
        return [{ value: data }];
      }

      function renderTable(target, data) {
        target.innerHTML = "";
        target.className = "result";

        const rows = toRows(data);
        if (rows.length === 0) {
          target.textContent = "No data returned.";
          target.className = "result empty";
          return;
        }

        const table = document.createElement("table");
        const thead = document.createElement("thead");
        const tbody = document.createElement("tbody");
        const headerRow = document.createElement("tr");
        const columns = Object.keys(rows[0]);

        columns.forEach((column) => {
          const th = document.createElement("th");
          th.textContent = column;
          headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);

        rows.forEach((row) => {
          const tr = document.createElement("tr");
          columns.forEach((column) => {
            const td = document.createElement("td");
            td.textContent = formatValue(row[column]);
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });

        table.appendChild(thead);
        table.appendChild(tbody);
        target.appendChild(table);
      }

      function resetResult(target) {
        target.textContent = "No data yet.";
        target.className = "result empty";
      }

      async function requestJson(url, options = {}) {
        const res = await fetch(url, options);
        const data = await res.json();
        if (!res.ok) {
          const message = data?.detail || data?.message || "Request failed. Please try again.";
          throw new Error(message);
        }
        return data;
      }

      mockBtn.addEventListener("click", async () => {
        const userId = document.getElementById("userId").value;
        const opType = document.getElementById("opType").value;

        if (!userId) {
          setStatus("Please enter user_id first.", true);
          return;
        }

        setStatus("Generating mock data and extracting features...");
        riskBtn.disabled = true;
        resetResult(riskResult);

        try {
          const query = new URLSearchParams({
            user_id: userId,
            op_type: opType,
          });
          const data = await requestJson(
            `/ai-secure-agent/v1/demo/mock-data?${query.toString()}`,
            { method: "POST" },
          );
          renderTable(featureResult, data);
          confirmedUserId = userId;
          riskBtn.disabled = false;
          setStatus("Features generated. Review them before running risk assessment.");
        } catch (error) {
          featureResult.textContent = "Request failed.";
          featureResult.className = "result empty";
          setStatus(`Generation failed: ${error.message}`, true);
        }
      });

      // -----------------------------------------------------------------------
      // Risk Assessment rendering helpers
      // -----------------------------------------------------------------------

      const FEATURE_LABEL_MAP = {
        order_count_last_1h: "Orders in Last 1 Hour",
        order_count_last_24h: "Orders in Last 24 Hours",
        order_count_last_7d: "Orders in Last 7 Days",
        order_amount_last_1h: "Order Amount (Last 1 Hour)",
        order_amount_last_24h: "Order Amount (Last 24 Hours)",
        order_amount_last_7d: "Order Amount (Last 7 Days)",
        account_age_days: "Account Age (Days)",
        unique_ip_count: "Unique IP Count",
        failed_payment_count: "Failed Payment Count",
        chargeback_count: "Chargeback Count",
        avg_order_amount: "Avg Order Amount",
        last_status: "Last Status",
      };

      function formatFeatureLabel(name) {
        if (FEATURE_LABEL_MAP[name]) return FEATURE_LABEL_MAP[name];
        return name
          .split("_")
          .map((w) => w.charAt(0).toUpperCase() + w.slice(1))
          .join(" ");
      }

      function formatScoreValue(value) {
        if (value === null || value === undefined) return "N/A";
        const num = parseFloat(value);
        return isNaN(num) ? String(value) : num.toFixed(2);
      }

      function safeParseJSON(str) {
        if (!str) return null;
        try {
          return JSON.parse(str);
        } catch (e) {
          console.warn("safeParseJSON: failed to parse JSON", e);
          return null;
        }
      }

      function createSection(title) {
        const div = document.createElement("div");
        div.className = "risk-section";
        const t = document.createElement("div");
        t.className = "risk-section-title";
        t.textContent = title;
        div.appendChild(t);
        return div;
      }

      function naText() {
        const s = document.createElement("span");
        s.className = "na-text";
        s.textContent = "N/A";
        return s;
      }

      function renderRiskAssessment(target, data) {
        target.innerHTML = "";
        target.className = "result";

        if (!data || Object.keys(data).length === 0) {
          target.textContent = "No assessment data returned.";
          target.className = "result empty";
          return;
        }

        const wrapper = document.createElement("div");

        // --- Risk Summary ---
        const summarySection = createSection("Risk Summary");
        const riskLevel = (data.risk_level || "").toLowerCase();
        const badgeClass = ["low", "medium", "high"].includes(riskLevel)
          ? `risk-badge-${riskLevel}`
          : "risk-badge-unknown";
        const badge = document.createElement("span");
        badge.className = `risk-badge ${badgeClass}`;
        badge.textContent = riskLevel ? riskLevel.toUpperCase() : "N/A";
        summarySection.appendChild(badge);

        const scoreRow = document.createElement("div");
        scoreRow.className = "score-row";
        [
          ["Risk Score", data.risk_score != null ? formatScoreValue(data.risk_score) : null],
          ["Fraud Probability", data.fraud_probability != null ? (parseFloat(data.fraud_probability) * 100).toFixed(2) + "%" : null],
        ].forEach(([label, val]) => {
          const item = document.createElement("div");
          item.className = "score-item";
          item.innerHTML = `${label}: <span>${val != null ? val : "N/A"}</span>`;
          scoreRow.appendChild(item);
        });
        summarySection.appendChild(scoreRow);
        wrapper.appendChild(summarySection);

        // --- Recommendation ---
        const recSection = createSection("Recommendation");
        const rec = safeParseJSON(data.recommendation);
        if (rec) {
          const action = (rec.recommended_action || "").toLowerCase();
          const actionClass = ["allow", "watchlist", "manual_review", "block"].includes(action)
            ? `action-badge-${action}`
            : "action-badge-unknown";
          const actionBadge = document.createElement("span");
          actionBadge.className = `action-badge ${actionClass}`;
          actionBadge.textContent = action ? action.replace(/_/g, " ").toUpperCase() : "N/A";
          recSection.appendChild(actionBadge);

          if (rec.confidence) {
            const conf = document.createElement("div");
            conf.className = "score-item";
            conf.style.marginTop = "6px";
            conf.innerHTML = `Confidence: <span>${rec.confidence.toUpperCase()}</span>`;
            recSection.appendChild(conf);
          }

          const reasonText = rec.reason || rec.analyst_summary || "";
          if (reasonText) {
            const sentences = reasonText
              .split(/[.;]+/)
              .map((s) => s.trim())
              .filter(Boolean);
            const ul = document.createElement("ul");
            ul.className = "bullet-list";
            sentences.forEach((s) => {
              const li = document.createElement("li");
              li.textContent = /[.!?]$/.test(s) ? s : s + ".";
              ul.appendChild(li);
            });
            recSection.appendChild(ul);
          }
        } else {
          recSection.appendChild(naText());
        }
        wrapper.appendChild(recSection);

        // --- Explainability / Top Contributions ---
        const contribSection = createSection("Explainability / Top Contributions");
        const contributions = Array.isArray(data.ml_top_contribution)
          ? data.ml_top_contribution
          : [];
        if (contributions.length > 0) {
          const sorted = [...contributions].sort(
            (a, b) => Math.abs(b.impact) - Math.abs(a.impact),
          );
          const tbl = document.createElement("table");
          tbl.className = "contrib-table";
          tbl.innerHTML =
            "<thead><tr><th>Feature</th><th>Impact</th><th>Ratio</th><th>Direction</th></tr></thead>";
          const tbody = document.createElement("tbody");
          sorted.forEach((item) => {
            const tr = document.createElement("tr");
            const impact = parseFloat(item.impact);
            const direction = impact > 0 ? "▲ Risk" : "▼ Risk";
            const impactClass = impact > 0 ? "impact-positive" : "impact-negative";
            tr.innerHTML = `
              <td>${formatFeatureLabel(item.name || "")}</td>
              <td class="${impactClass}">${isNaN(impact) ? "N/A" : impact.toFixed(4)}</td>
              <td>${item.ratio || "N/A"}</td>
              <td class="${impactClass}">${direction}</td>
            `;
            tbody.appendChild(tr);
          });
          tbl.appendChild(tbody);
          contribSection.appendChild(tbl);
        } else {
          contribSection.appendChild(naText());
        }
        wrapper.appendChild(contribSection);

        // --- Triggered Rules ---
        const rulesSection = createSection("Triggered Rules");
        const rules = Array.isArray(data.triggered_rules) ? data.triggered_rules : [];
        if (rules.length > 0) {
          const chipList = document.createElement("div");
          chipList.className = "chip-list";
          rules.forEach((rule) => {
            const chip = document.createElement("span");
            chip.className = "chip";
            chip.textContent = rule;
            chipList.appendChild(chip);
          });
          rulesSection.appendChild(chipList);
        } else {
          const none = document.createElement("span");
          none.className = "na-text";
          none.textContent = "No rules triggered.";
          rulesSection.appendChild(none);
        }
        wrapper.appendChild(rulesSection);

        // --- Raw Details (collapsible) ---
        const rawSection = createSection("Raw Details");
        const toggleBtn = document.createElement("button");
        toggleBtn.className = "collapsible-toggle";
        toggleBtn.type = "button";
        toggleBtn.textContent = "View Raw JSON";
        const rawBox = document.createElement("pre");
        rawBox.className = "raw-json-box";
        rawBox.textContent = JSON.stringify(data, null, 2);
        toggleBtn.addEventListener("click", () => {
          const isHidden = rawBox.style.display === "none" || rawBox.style.display === "";
          rawBox.style.display = isHidden ? "block" : "none";
          toggleBtn.textContent = isHidden ? "Hide Raw JSON" : "View Raw JSON";
        });
        rawSection.appendChild(toggleBtn);
        rawSection.appendChild(rawBox);
        wrapper.appendChild(rawSection);

        target.appendChild(wrapper);
      }

      riskBtn.addEventListener("click", async () => {
        if (!confirmedUserId) {
          setStatus("Please generate and confirm features first.", true);
          return;
        }

        setStatus("Running risk assessment...");

        try {
          const query = new URLSearchParams({ user_id: confirmedUserId });
          const data = await requestJson(
            `/ai-secure-agent/v1/demo/risk-access?${query.toString()}`,
            { method: "POST" },
          );
          renderRiskAssessment(riskResult, data);
          setStatus("Risk assessment completed.");
        } catch (error) {
          riskResult.textContent = "Request failed.";
          riskResult.className = "result empty";
          setStatus(`Assessment failed: ${error.message}`, true);
        }
      });
    </script>
  </body>
</html>
