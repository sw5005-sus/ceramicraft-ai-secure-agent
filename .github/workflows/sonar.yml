name: Sonar

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 0 * * 0' # Run every Sunday at midnight

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests with coverage
        run: |
          export PYTHONPATH=$(pwd)/src
          uv run pytest \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-config=pyproject.toml 
      - name: Debug coverage file
        run: |
          cat coverage.xml | head -n 20   
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@1a6d90ebcb0e6a6b1d87e37ba693fe453195ae25
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=sw5005-sus_ceramicraft-ai-secure-agent
            -Dsonar.organization=sw5005-sus
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=src/ceramicraft_ai_secure_agent/service
            -Dsonar.verbose=true

      - name: SonarCloud Quality Gate check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
