name: Trivy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0' # Run every Sunday at midnight

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build --no-cache -t ceramicraft-ai-secure-agent:${{ github.sha }} .

      - name: Run Trivy scanner (Image mode)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'ceramicraft-ai-secure-agent:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      - name: Trivy summary
        if: always()
        run: |
          trivy image \
            --quiet \
            --format json \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            -o trivy.json \
            ceramicraft-ai-secure-agent:${{ github.sha }}
      
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          TOTAL=$((HIGH + CRITICAL))
      
          echo "==== Trivy Summary ===="
          echo "Total: ${TOTAL} (HIGH: ${HIGH}, CRITICAL: ${CRITICAL})"
