name: Train Model

on:
  workflow_dispatch:
    inputs:
      training_data_s3_key:
        description: "S3 object key under s3://ceramicraft-mldataset"
        required: true
        default: "fraud/v2/fraud_training_data.csv"
        type: string

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install training dependencies
        run: uv sync --group train

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download training data from S3
        env:
          DATASET_S3_KEY: ${{ inputs.training_data_s3_key }}
        run: |
          mkdir -p data
          aws s3 cp "s3://ceramicraft-mldataset/${DATASET_S3_KEY}" "data/fraud_training_data.csv"

      - name: Train model
        env:
          TRAINING_DATA_PATH: data/fraud_training_data.csv
          MLFLOW_TRACKING_URI: mlflow.ntdoc.site
        run: uv run --group train python scripts/train_model.py

      - name: Enforce model quality gates
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          metrics_path = Path("artifacts/model_metadata.json")
          if not metrics_path.exists():
              raise FileNotFoundError(f"Expected metrics file not found: {metrics_path}")

          payload = json.loads(metrics_path.read_text(encoding="utf-8"))
          metrics = payload.get("metrics", {})
          thresholds = {
              "accuracy": 0.95,
              "precision": 0.80,
              "recall": 0.95,
              "f1": 0.88,
              "roc_auc": 0.98,
          }

          failed = []
          for name, threshold in thresholds.items():
              value = metrics.get(name)
              if value is None:
                  failed.append(f"{name}=missing (required >= {threshold:.4f})")
                  continue
              if float(value) < threshold:
                  failed.append(f"{name}={float(value):.4f} (required >= {threshold:.4f})")

          print("Model metrics:", metrics)
          if failed:
              raise SystemExit("Model quality gate failed: " + ", ".join(failed))
          print("Model quality gate passed.")
          PY

      - name: Upload training artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: artifacts/
          if-no-files-found: warn
